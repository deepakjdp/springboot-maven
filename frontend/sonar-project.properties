# Angular Frontend SonarQube Configuration
sonar.projectKey=springboot-angular-app-frontend
sonar.projectName=Spring Boot Angular Application - Frontend
sonar.projectVersion=1.0.0

# Source and test directories
sonar.sources=src/app
sonar.tests=src/app
sonar.test.inclusions=**/*.spec.ts

# Exclusions
sonar.exclusions=**/node_modules/**,**/dist/**,**/*.spec.ts,**/environments/**,**/main.ts,**/polyfills.ts

# TypeScript configuration
sonar.typescript.lcov.reportPaths=coverage/lcov.info

# Encoding
sonar.sourceEncoding=UTF-8

# Coverage threshold
sonar.coverage.minimum=70

