# Spring Boot Backend SonarQube Configuration
sonar.projectKey=springboot-angular-app
sonar.projectName=Spring Boot Angular Application
sonar.projectVersion=1.0.0

# Source and test directories
sonar.sources=src/main/java
sonar.tests=src/test/java

# Java version
sonar.java.source=17
sonar.java.target=17

# Encoding
sonar.sourceEncoding=UTF-8

# Coverage reports
sonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml
sonar.junit.reportPaths=target/surefire-reports

# Exclusions
sonar.exclusions=**/entity/**,**/dto/**,**/config/**,**/*Application.java
sonar.test.exclusions=**/*Test.java,**/*Tests.java

# Coverage exclusions
sonar.coverage.exclusions=**/entity/**,**/dto/**,**/config/**,**/*Application.java

# Minimum coverage threshold
sonar.coverage.minimum=70

